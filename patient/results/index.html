<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Patient-friendly FDA medication access results with clear known versus inferred supply signals."
    />
    <title>Patient Results | PharmaPath</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="patient-results">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header" data-site-header></header>

    <main id="main-content" class="page page-results">
      <section class="page-hero page-hero-results" data-reveal>
        <div class="page-shell results-hero-grid">
          <div class="hero-copy">
            <p class="eyebrow">Patient results</p>
            <h1>See nearby pharmacy options and an access signal without wading through raw data.</h1>
            <p class="hero-text">
              The summary answers two questions first: where should I call now, and does FDA data suggest likely friction?
            </p>
          </div>

          <form class="search-panel surface-card" action="/patient/results/" method="get" data-search-form>
            <label class="field-label" for="patient-results-query">Medication name</label>
            <input
              id="patient-results-query"
              class="search-input"
              name="query"
              type="text"
              placeholder="Example: Wegovy"
              autocomplete="off"
              required
            />
            <button class="button button-primary button-block" type="submit">
              Refresh search + ranking
            </button>
            <a class="text-link muted-link" href="/patient/">Back to patient search</a>
          </form>
        </div>
      </section>

      <section class="section section-results-output">
        <div class="page-shell">
          <div id="patient-results-root" class="results-root" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="/script.js"></script>
  </body>
</html>
