name: Sync GitHub issues to Discord

on:
  issues:
    types:
      - assigned
      - closed
      - deleted
      - edited
      - labeled
      - opened
      - reopened
      - unassigned
      - unlabeled
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: github-issues-discord-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      DISCORD_ISSUES_WEBHOOK_URL: ${{ secrets.DISCORD_ISSUES_WEBHOOK_URL }}
      DISCORD_ISSUE_SYNC_STATE_BRANCH: discord-issue-sync-state
      DISCORD_ISSUE_SYNC_STATE_PATH: .github/discord-issue-sync/issues.json
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      GITHUB_TOKEN: ${{ github.token }}
      HAS_DISCORD_ISSUES_WEBHOOK: ${{ secrets.DISCORD_ISSUES_WEBHOOK_URL != '' }}

    steps:
      - name: Skip when Discord webhook secret is missing
        if: env.HAS_DISCORD_ISSUES_WEBHOOK != 'true'
        run: echo "DISCORD_ISSUES_WEBHOOK_URL is not configured; skipping issue sync."

      - name: Checkout
        if: env.HAS_DISCORD_ISSUES_WEBHOOK == 'true'
        uses: actions/checkout@v6

      - name: Setup Node
        if: env.HAS_DISCORD_ISSUES_WEBHOOK == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Sync open issues into Discord
        if: env.HAS_DISCORD_ISSUES_WEBHOOK == 'true'
        run: node scripts/github/discord-issue-sync.mjs ${{ github.event_name == 'workflow_dispatch' && 'full-resync' || 'event-sync' }}
